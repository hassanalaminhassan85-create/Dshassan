# wrangler.toml - Cloudflare Pages & Workers Configuration
name = "dstech-career-portal"
pages_build_output_dir = "dist"

[vars]
# Server-side environment variables
NODE_VERSION = "22"
# GEMINI_API_KEY can be set via Cloudflare dashboard or Wrangler Secrets: npx wrangler secret put GEMINI_API_KEY

# PRODUCTION SECRETS AND ENVIRONMENT VARIABLES
# Note: DO NOT hardcode secret keys here. Use wrangler secret command to set them:
# npx wrangler secret put BREVO_API_KEY
# npx wrangler secret put ADMIN_PASSCODE
# npx wrangler secret put JWT_SECRET

# BREVO_API_KEY = "xkeysib-..."
# ADMIN_PASSCODE = "..."
# JWT_SECRET = "super-secret-cryptographic-signing-key"

# 1. Cloudflare D1 Relational SQL Database Binding
[[d1_databases]]
binding = "DB"
database_name = "dstech-portal-db"
database_id = "533a56ff-2ee2-4365-9782-275758f71a28" # Replace with actual live D1 database ID

# 2. Cloudflare R2 Object Storage Binding (for secure QR badges/images)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "dstech-qr-storage"


# 4. Cloudflare Queues (Background AI Processing Queue)
[[queues.producers]]
queue = "dstech-ai-analysis-queue"
binding = "AI_QUEUE"


